backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: public/images
public_folder: /images

locale: fr

collections:
  - name: articles
    label: Articles
    label_singular: Article
    folder: src/content/articles
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    media_folder: /public/images/articles
    public_folder: /images/articles
    fields:
      - { label: "Titre", name: title, widget: string }
      - { label: "Sous-titre", name: subtitle, widget: string, required: false }
      - label: "Date"
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "DD/MM/YYYY"
        time_format: false
      - label: "Catégorie"
        name: category
        widget: select
        options:
          - { label: "Tutoriels", value: tutoriels }
          - { label: "Astuces", value: astuces }
          - { label: "Scanner statique", value: scanner-statique }
          - { label: "Scanner dynamique", value: scanner-dynamique }
          - { label: "Drone", value: drone }
          - { label: "Comparatifs", value: comparatifs }
          - { label: "Cas concrets", value: cas-concrets }
      - { label: "Tags", name: tags, widget: list, required: false }
      - { label: "Auteur", name: author, widget: string, default: loic }
      - { label: "Image hero", name: heroImage, widget: image }
      - { label: "Alt image hero", name: heroImageAlt, widget: string }
      - { label: "Extrait", name: excerpt, widget: text }
      - { label: "Premium", name: isPremium, widget: boolean, default: false }
      - { label: "Publié", name: isPublished, widget: boolean, default: true }
      - { label: "Contenu", name: body, widget: markdown }

  - name: chantiers
    label: Chantiers
    label_singular: Chantier
    folder: src/content/chantiers
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    media_folder: /public/images/chantiers
    public_folder: /images/chantiers
    fields:
      - { label: "Titre", name: title, widget: string }
      - label: "Date"
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "DD/MM/YYYY"
        time_format: false
      - { label: "Surface", name: surface, widget: string, required: false }
      - { label: "Matériel utilisé", name: materiel, widget: list, required: false }
      - { label: "Problème rencontré", name: probleme, widget: text }
      - { label: "Leçon apprise", name: lecon, widget: text }
      - { label: "Tags", name: tags, widget: list, required: false }
      - { label: "Publié", name: isPublished, widget: boolean, default: true }
      - { label: "Contenu", name: body, widget: markdown }

  - name: glossaire
    label: Glossaire
    label_singular: Terme
    folder: src/content/glossaire
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    fields:
      - { label: "Titre", name: title, widget: string }
      - label: "Date"
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "DD/MM/YYYY"
        time_format: false
      - label: "Difficulté"
        name: difficulty
        widget: select
        options:
          - { label: "Débutant", value: debutant }
          - { label: "Intermédiaire", value: intermediaire }
          - { label: "Expert", value: expert }
      - { label: "Articles liés", name: relatedArticles, widget: list, required: false }
      - { label: "Chantiers liés", name: relatedChantiers, widget: list, required: false }
      - { label: "Extrait", name: excerpt, widget: text }
      - { label: "Publié", name: isPublished, widget: boolean, default: true }
      - { label: "Contenu", name: body, widget: markdown }

  - name: minute-topo
    label: Minute Topo
    label_singular: Minute Topo
    folder: src/content/minute-topo
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    fields:
      - { label: "Titre", name: title, widget: string }
      - label: "Date"
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "DD/MM/YYYY"
        time_format: false
      - { label: "Tags", name: tags, widget: list, required: false }
      - { label: "Extrait", name: excerpt, widget: text }
      - { label: "Publié", name: isPublished, widget: boolean, default: true }
      - { label: "Contenu", name: body, widget: markdown }
